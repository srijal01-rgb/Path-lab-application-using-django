{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Tech - Laboratory Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <i class="fas fa-flask-vial me-2"></i>Lab Tech
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link nav-item-hover" href="/" aria-label="Dashboard">
                        <i class="fas fa-chart-line me-1"></i>Dashboard
                    </a>
                    <a class="nav-link nav-item-hover" href="/patients/" aria-label="Patients">
                        <i class="fas fa-users me-1"></i>Patients
                    </a>
                    <a class="nav-link nav-item-hover" href="/tests/" aria-label="Tests">
                        <i class="fas fa-flask me-1"></i>Tests
                    </a>
                    <a class="nav-link nav-item-hover" href="/reports/" aria-label="Reports">
                        <i class="fas fa-file-alt me-1"></i>Reports
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content py-4">
        <div class="container-fluid px-4">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer bg-light border-top mt-5 py-4">
        <div class="container-fluid text-center text-muted">
            <p class="mb-0">&copy; 2024 Lab Tech. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
