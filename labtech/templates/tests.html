{% extends "base.html" %}

{% block content %}
<h2>Tests</h2>

<div class="card p-3 mb-4">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" name="name" class="form-control" placeholder="Test Name">
            </div>
             <div class="col-md-12">
                <textarea name="description" class="form-control" placeholder="Description"></textarea>
            </div>
            <div class="col-md-4">
                <input type="number" step="0.01" name="price" class="form-control" placeholder="Price">
            </div>
           
            <div class="col-md-12">
                <button class="btn btn-success">Save Test</button>
            </div>
        </div>
    </form>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody>
        {% for test in tests %}
        <tr>
            <td>{{ test.name }}</td>
            <td>{{ test.description }}</td>
            <td>{{ test.price }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
